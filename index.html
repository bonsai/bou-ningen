<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>ドット棒人間 / DOT BOU-NINGEN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#050505;
  background-image:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px);
  color:#00ff41;font-family:monospace;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;gap:14px;padding:14px
}
h1{font:bold clamp(12px,3vw,18px) monospace;letter-spacing:6px;opacity:.55;text-shadow:0 0 12px rgba(0,255,65,.4)}
.stage{
  position:relative;width:100%;max-width:680px;
  background:linear-gradient(160deg,#1c1c1c,#0c0c0c);
  border:clamp(8px,1.8vw,16px) solid;border-color:#3a3a3a #282828 #1e1e1e #282828;border-radius:16px;
  box-shadow:0 0 0 3px #4a4a4a,0 0 0 5px #111,0 14px 52px rgba(0,0,0,.85),inset 0 0 70px rgba(0,0,0,.6);
  padding:clamp(8px,1.8vw,18px)
}
.cw{background:#000;border-radius:6px;padding:clamp(3px,.6vw,6px);box-shadow:inset 0 0 28px rgba(0,0,0,.8);position:relative}
canvas{display:block;width:100%;height:auto;background:#000;border-radius:3px}
.ctrl{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;max-width:680px}
.btn{
  background:linear-gradient(180deg,#1a1a1a,#0d0d0d);border:1px solid #2a2a2a;border-bottom:3px solid #005515;
  color:#00ff41;border-radius:6px;cursor:pointer;font:clamp(9px,1.8vw,12px) monospace;letter-spacing:1px;
  padding:clamp(9px,1.8vw,13px) clamp(12px,2.4vw,18px);box-shadow:0 3px 8px rgba(0,0,0,.5)
}
.btn:active{transform:translateY(2px);border-bottom-width:1px}
.btn.on{color:#fff;border-bottom-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.2)}
.btn.rec-active{color:#ff4444;border-bottom-color:#ff4444;animation:recpulse .7s infinite alternate}
@keyframes recpulse{from{box-shadow:0 0 6px rgba(255,68,68,.3)}to{box-shadow:0 0 18px rgba(255,68,68,.8)}}
.slider{display:flex;align-items:center;gap:8px;color:#2a8a2a;font:clamp(9px,1.6vw,11px) monospace}
.slider input[type=range]{
  width:clamp(80px,20vw,150px);height:5px;-webkit-appearance:none;appearance:none;
  background:linear-gradient(90deg,#0f3a0f,#1a1a1a);border-radius:3px;outline:none
}
.slider input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,#4a4a4a,#252525);border:2px solid #00ff41;cursor:pointer;box-shadow:0 0 8px rgba(0,255,65,.35)
}
.foot{font:9px monospace;color:#2a4a2a;letter-spacing:2px;opacity:.6}
.foot a{color:#0f0;text-decoration:none;opacity:.7}
#overlay{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);border-radius:6px;pointer-events:none;z-index:10;flex-direction:column;gap:8px
}
#overlay.active{display:flex}
#countNum{font:bold clamp(32px,12vw,72px) monospace;color:#ff4444;text-shadow:0 0 20px rgba(255,68,68,.8)}
#countLabel{font:clamp(9px,2vw,12px) monospace;color:#ff8888;letter-spacing:3px}
#camVideo{display:none}
</style>
</head>
<body>
  <h1>ドット 棒 人 間</h1>
  <div class="stage">
    <div class="cw">
      <canvas id="cv" width="600" height="600"></canvas>
      <div id="overlay">
        <div id="countNum">5</div>
        <div id="countLabel">REC</div>
      </div>
    </div>
  </div>
  <div class="ctrl">
    <button class="btn on" id="playBtn">⏸ PAUSE</button>
    <button class="btn" id="rainbowBtn">🌈 RAINBOW</button>
    <div class="slider">SPEED <input type="range" id="speed" min="1" max="10" value="4"></div>
    <div class="slider">DOT <input type="range" id="dot" min="12" max="40" value="22"></div>
    <input type="color" id="color" value="#00ff41" style="width:44px;height:34px;border:2px solid #0f0;border-radius:5px;background:#000;cursor:pointer">
    <button class="btn motion-btn on" id="motionWalk">🚶 WALK</button>
    <button class="btn motion-btn" id="motionIdle">🧍 IDLE</button>
    <button class="btn motion-btn" id="motionWave">👋 WAVE</button>
    <button class="btn motion-btn" id="motionJump">🦘 JUMP</button>
    <button class="btn motion-btn" id="motionDance">💃 DANCE</button>
    <button class="btn" id="recBtn">📹 REC 5s</button>
  </div>
  <div class="foot">DOT-MATRIX STICKMAN · MediaPipe対応 · <a href="line.html">LINE版 →</a></div>

<video id="camVideo" playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>

<script>
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");

let playing = true;
let speedVal = 4;
let dotPitch = 22;
let baseColor = "#00ff41";
let rainbow = false;
let rhue = 120;
let phase = 0;
let walkX = 0;
let motionType = "walk";

let recordedFrames = [];
let isRecording = false;
let recordCountdown = 5;
let countdownTimer = null;
let playbackIdx = 0;
let mpPose = null;
let mpCamera = null;
let latestLandmarks = null;

function skeleton(cx, ph, type) {
  type = type || motionType;
  const headR = 2.4;
  const headCY = 4.2;
  const shoulderY = headCY + headR + 1.6;
  const hipY = shoulderY + 8.5;
  const legLen = 8;
  const armLen = 6.5;

  let swing = Math.sin(ph) * 3.0;
  let armSwing = Math.sin(ph + Math.PI) * 2.6;
  let bob = Math.abs(Math.cos(ph)) * 1.2;
  let hipSway = Math.sin(ph) * 0.7;
  let torsoTilt = Math.sin(ph) * 0.4;

  if (type === "idle") {
    swing = Math.sin(ph * 0.6) * 0.8;
    armSwing = Math.sin(ph * 0.7) * 1.1;
    bob = Math.sin(ph * 0.4) * 0.4;
    hipSway = Math.sin(ph * 0.6) * 0.3;
    torsoTilt = 0;
  } else if (type === "wave") {
    swing = Math.sin(ph * 0.8) * 1.2;
    armSwing = Math.sin(ph * 5) * 5.5;
    bob = 0.6;
    hipSway = Math.sin(ph * 0.8) * 0.4;
    torsoTilt = 0;
  } else if (type === "jump") {
    bob = Math.max(0, Math.sin(ph * 3) * 9 - 4);
    swing = Math.sin(ph * 2) * 2;
    armSwing = Math.sin(ph * 2.5) * 3;
    hipSway = 0;
    torsoTilt = 0;
  } else if (type === "dance") {
    swing = Math.sin(ph * 4) * 4.5;
    armSwing = Math.sin(ph * 4.5) * 5;
    bob = Math.abs(Math.sin(ph * 3)) * 2.5;
    hipSway = Math.sin(ph * 4) * 1.5;
    torsoTilt = Math.sin(ph * 4) * 0.8;
  }

  const cy0 = -bob;
  const head = { x: cx + torsoTilt * 0.3, y: headCY + cy0, r: headR };
  const shoulder = { x: cx + torsoTilt, y: shoulderY + cy0 };
  const hip = { x: cx + hipSway, y: hipY + cy0 };
  const armBase = 2.2;
  const legBase = 1.4;

  const lElbowX = shoulder.x - armBase + armSwing * 0.6;
  const lElbowY = shoulder.y + armLen * 0.48 + cy0;
  const rElbowX = shoulder.x + armBase - armSwing * 0.4;
  const rElbowY = shoulder.y + armLen * 0.48 + cy0;

  const lKneeX = hip.x - legBase * 0.6 - swing * 0.4;
  const lKneeY = hip.y + legLen * 0.5;
  const rKneeX = hip.x + legBase * 0.6 + swing * 0.25;
  const rKneeY = hip.y + legLen * 0.5;

  const segs = [
    [head.x, head.y + headR, shoulder.x, shoulder.y],
    [shoulder.x, shoulder.y, hip.x, hip.y],
    [shoulder.x, shoulder.y + 0.4, lElbowX, lElbowY],
    [lElbowX, lElbowY, shoulder.x - armBase + armSwing, shoulder.y + armLen + cy0],
    [shoulder.x, shoulder.y + 0.4, rElbowX, rElbowY],
    [rElbowX, rElbowY, shoulder.x + armBase - armSwing * 0.6, shoulder.y + armLen + cy0],
    [hip.x, hip.y, lKneeX, lKneeY],
    [lKneeX, lKneeY, hip.x - legBase - swing, hipY + legLen + cy0],
    [hip.x, hip.y, rKneeX, rKneeY],
    [rKneeX, rKneeY, hip.x + legBase + swing * 0.7, hipY + legLen + cy0],
  ];
  return { head, segs, bottom: hipY + legLen };
}

function skeletonFromLandmarks(lm, cx) {
  const hipMidX = (lm[23].x + lm[24].x) / 2;
  const hipMidY = (lm[23].y + lm[24].y) / 2;
  const shoulderMidX = (lm[11].x + lm[12].x) / 2;
  const shoulderMidY = (lm[11].y + lm[12].y) / 2;

  const topY = lm[0].y;
  const botY = Math.max(lm[27].y, lm[28].y);
  const normH = botY - topY;
  const ourH = 20.0;
  const scale = normH > 0.04 ? ourH / normH : 200;

  function gx(idx) { return cx - (lm[idx].x - hipMidX) * scale; }
  function gy(idx) { return (lm[idx].y - topY) * scale; }
  function gxV(v) { return cx - (v - hipMidX) * scale; }
  function gyV(v) { return (v - topY) * scale; }

  const smx = gxV(shoulderMidX), smy = gyV(shoulderMidY);
  const hmx = gxV(hipMidX), hmy = gyV(hipMidY);

  const headR = 2.4;
  const noseGy = gy(0);
  const head = { x: gx(0), y: noseGy, r: headR };

  const segs = [
    [head.x, noseGy + headR, smx, smy],
    [smx, smy, hmx, hmy],
    [smx, smy, gx(12), gy(12)],
    [gx(12), gy(12), gx(14), gy(14)],
    [gx(14), gy(14), gx(16), gy(16)],
    [smx, smy, gx(11), gy(11)],
    [gx(11), gy(11), gx(13), gy(13)],
    [gx(13), gy(13), gx(15), gy(15)],
    [hmx, hmy, gx(24), gy(24)],
    [gx(24), gy(24), gx(26), gy(26)],
    [gx(26), gy(26), gx(28), gy(28)],
    [hmx, hmy, gx(23), gy(23)],
    [gx(23), gy(23), gx(25), gy(25)],
    [gx(25), gy(25), gx(27), gy(27)],
  ];

  const bottom = Math.max(gy(27), gy(28));
  return { head, segs, bottom };
}

function distToSeg(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  let t = len2 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function isLit(col, row, sk) {
  if (Math.hypot(col - sk.head.x, row - sk.head.y) <= sk.head.r + 0.62) return true;
  for (const s of sk.segs) {
    if (distToSeg(col, row, s[0], s[1], s[2], s[3]) < 0.58) return true;
  }
  return false;
}

function litColor() {
  if (rainbow) { rhue = (rhue + 1.5) % 360; return `hsl(${rhue},100%,60%)`; }
  return baseColor;
}

function frame() {
  const W = cv.width, H = cv.height;
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  const pitch = dotPitch;
  const COLS = Math.floor(W / pitch);
  const ROWS = Math.floor(H / pitch);
  const r = pitch * 0.40;
  const offX = (W - COLS * pitch) / 2 + pitch / 2;
  const offY = (H - ROWS * pitch) / 2 + pitch / 2;
  const px = (c) => offX + c * pitch;
  const py = (rr) => offY + rr * pitch;

  const col = litColor();
  const groundRow = ROWS - 3;
  const cx = ((walkX % (COLS + 8)) + (COLS + 8)) % (COLS + 8) - 4;

  let sk;
  if (motionType === "playback" && recordedFrames.length > 0) {
    const frameData = recordedFrames[playbackIdx % recordedFrames.length];
    const sk0 = skeletonFromLandmarks(frameData, 0);
    const yShift = groundRow - sk0.bottom;
    sk = skeletonFromLandmarks(frameData, cx);
    sk.head.y += yShift;
    for (const s of sk.segs) { s[1] += yShift; s[3] += yShift; }
  } else {
    const sk0 = skeleton(0, phase);
    const yShift = groundRow - sk0.bottom;
    sk = skeleton(cx, phase);
    sk.head.y += yShift;
    for (const s of sk.segs) { s[1] += yShift; s[3] += yShift; }
  }

  for (let rr = 0; rr < ROWS; rr++) {
    for (let c = 0; c < COLS; c++) {
      const lit = isLit(c, rr, sk);
      const x = px(c), y = py(rr);
      ctx.beginPath();
      if (lit) {
        ctx.fillStyle = col;
        ctx.shadowColor = col; ctx.shadowBlur = pitch * 0.5;
        ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.beginPath(); ctx.fillStyle = "rgba(255,255,255,.35)";
        ctx.arc(x - r * 0.3, y - r * 0.3, r * 0.32, 0, Math.PI * 2); ctx.fill();
      } else {
        ctx.fillStyle = "rgba(255,255,255,.045)";
        ctx.arc(x, y, r * 0.82, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  ctx.strokeStyle = "rgba(0,255,65,.18)"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, py(groundRow) + r + 3); ctx.lineTo(W, py(groundRow) + r + 3); ctx.stroke();

  if (playing) {
    const speedFactor = 0.10 + speedVal * 0.02;
    phase += speedFactor;

    if (motionType === "playback") {
      playbackIdx = (playbackIdx + 1) % Math.max(1, recordedFrames.length);
      walkX += speedVal * 0.05;
    } else if (motionType === "walk") {
      walkX += speedVal * 0.10;
    } else {
      walkX += speedVal * 0.03;
    }
  }
  requestAnimationFrame(frame);
}

function setMotion(type) {
  motionType = type;
  document.querySelectorAll('.motion-btn').forEach(b => {
    b.classList.toggle('on', b.id === `motion${type.charAt(0).toUpperCase() + type.slice(1)}`);
  });
  const recBtn = document.getElementById("recBtn");
  recBtn.classList.toggle('on', type === 'playback');
}

function initMediaPipe(onReady) {
  if (mpPose) { onReady(); return; }

  const video = document.getElementById("camVideo");

  mpPose = new Pose({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
  });
  mpPose.setOptions({
    modelComplexity: 1,
    smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  mpPose.onResults((results) => {
    if (results.poseLandmarks) {
      latestLandmarks = results.poseLandmarks;
      if (isRecording) {
        recordedFrames.push(results.poseLandmarks.slice());
      }
    }
  });

  mpCamera = new Camera(video, {
    onFrame: async () => {
      if (mpPose) await mpPose.send({ image: video });
    },
    width: 320,
    height: 240
  });

  mpCamera.start().then(() => {
    onReady();
  }).catch((err) => {
    alert("カメラへのアクセスが拒否されました。\n" + err.message);
    mpPose = null;
    mpCamera = null;
  });
}

function startRecording() {
  const recBtn = document.getElementById("recBtn");
  const overlay = document.getElementById("overlay");
  const countNum = document.getElementById("countNum");
  const countLabel = document.getElementById("countLabel");

  recBtn.disabled = true;
  recBtn.classList.add("rec-active");

  initMediaPipe(() => {
    recordedFrames = [];
    isRecording = false;
    recordCountdown = 5;

    overlay.classList.add("active");
    countNum.textContent = recordCountdown;
    countLabel.textContent = "GET READY";

    countdownTimer = setInterval(() => {
      recordCountdown--;
      if (recordCountdown <= 0) {
        clearInterval(countdownTimer);
        countNum.textContent = "●";
        countLabel.textContent = "REC";
        isRecording = true;

        setTimeout(() => {
          isRecording = false;
          overlay.classList.remove("active");
          recBtn.disabled = false;
          recBtn.classList.remove("rec-active");
          recBtn.textContent = "🔄 REPLAY";

          if (recordedFrames.length > 0) {
            playbackIdx = 0;
            setMotion("playback");
          } else {
            alert("ポーズが検出されませんでした。明るい場所で試してください。");
          }
        }, 5000);
      } else {
        countNum.textContent = recordCountdown;
      }
    }, 1000);
  });
}

document.getElementById("playBtn").addEventListener("click", (e) => {
  playing = !playing;
  e.target.textContent = playing ? "⏸ PAUSE" : "▶ PLAY";
  e.target.classList.toggle("on", playing);
});
document.getElementById("rainbowBtn").addEventListener("click", (e) => {
  rainbow = !rainbow;
  e.target.classList.toggle("on", rainbow);
});
document.getElementById("speed").addEventListener("input", (e) => speedVal = +e.target.value);
document.getElementById("dot").addEventListener("input", (e) => dotPitch = +e.target.value);
document.getElementById("color").addEventListener("input", (e) => baseColor = e.target.value);

document.getElementById("motionWalk").addEventListener("click", () => setMotion("walk"));
document.getElementById("motionIdle").addEventListener("click", () => setMotion("idle"));
document.getElementById("motionWave").addEventListener("click", () => setMotion("wave"));
document.getElementById("motionJump").addEventListener("click", () => setMotion("jump"));
document.getElementById("motionDance").addEventListener("click", () => setMotion("dance"));
document.getElementById("recBtn").addEventListener("click", () => {
  if (!isRecording) startRecording();
});

frame();
</script>
</body>
</html>
