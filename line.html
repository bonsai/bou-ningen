<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<title>棒人間 / BOU-NINGEN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:#050505;
  background-image:repeating-linear-gradient(180deg,transparent 0,transparent 3px,rgba(0,0,0,.18) 3px,rgba(0,0,0,.18) 4px);
  color:#00ff41;font-family:monospace;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100dvh;gap:14px;padding:14px
}
h1{
  font:bold clamp(12px,3vw,18px) monospace;letter-spacing:6px;opacity:.5;
  text-shadow:0 0 12px rgba(0,255,65,.4)
}
.stage{
  position:relative;width:100%;max-width:960px;
  background:#000;border:clamp(6px,1.4vw,14px) solid;
  border-color:#3a3a3a #282828 #1e1e1e #282828;border-radius:14px;
  box-shadow:0 0 0 3px #4a4a4a,0 0 0 5px #111,0 12px 48px rgba(0,0,0,.85),inset 0 0 60px rgba(0,0,0,.6);
  padding:clamp(8px,1.6vw,18px)
}
canvas{display:block;width:100%;height:auto;background:#000;border-radius:4px}
.ctrl{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center}
.btn{
  background:linear-gradient(180deg,#1a1a1a,#0d0d0d);
  border:1px solid #2a2a2a;border-bottom:3px solid #005515;
  color:#00ff41;border-radius:6px;cursor:pointer;
  font:clamp(9px,1.8vw,12px) monospace;letter-spacing:1px;
  padding:clamp(9px,1.8vw,13px) clamp(12px,2.4vw,18px);
  box-shadow:0 3px 8px rgba(0,0,0,.5)
}
.btn:active{transform:translateY(2px);border-bottom-width:1px}
.btn.on{color:#fff;border-bottom-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.2)}
.slider{display:flex;align-items:center;gap:8px;color:#2a8a2a;font:clamp(9px,1.6vw,11px) monospace}
.slider input[type=range]{
  width:clamp(90px,24vw,180px);height:5px;-webkit-appearance:none;appearance:none;
  background:linear-gradient(90deg,#0f3a0f,#1a1a1a);border-radius:3px;outline:none
}
.slider input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:linear-gradient(135deg,#4a4a4a,#252525);border:2px solid #00ff41;cursor:pointer;
  box-shadow:0 0 8px rgba(0,255,65,.35)
}
.foot{font:9px monospace;color:#2a4a2a;letter-spacing:2px;opacity:.6}
.foot a{color:#0f0;text-decoration:none;opacity:.7}
</style>
</head>
<body>
  <h1>棒 人 間</h1>
  <div class="stage">
    <canvas id="cv" width="960" height="420"></canvas>
  </div>
  <div class="ctrl">
    <button class="btn on" id="playBtn">⏸ PAUSE</button>
    <button class="btn" id="addBtn">＋ 追加</button>
    <button class="btn" id="rmBtn">－ 削除</button>
    <div class="slider">SPEED <input type="range" id="speed" min="1" max="10" value="4"></div>
    <div class="slider">SIZE <input type="range" id="size" min="1" max="6" value="3"></div>
  </div>
  <div class="foot"><a href="/">← DOT版に戻る</a></div>

<script>
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const W = cv.width, H = cv.height;
const GROUND = H - 60;

let playing = true;
let speedVal = 4;
let sizeVal = 3;
let t = 0;

function makeWalker(i, total) {
  return {
    x: (W / (total + 1)) * (i + 1) - 40,
    phase: Math.random() * Math.PI * 2,
    dir: 1,
    hue: (i * 67) % 360,
    bob: 0
  };
}
let walkers = [makeWalker(0, 1)];

function rebuild(n) {
  walkers = [];
  for (let i = 0; i < n; i++) walkers.push(makeWalker(i, n));
}

function drawWalker(w, scale) {
  const headR = scale * 6, bodyH = scale * 22, armL = scale * 13, legL = scale * 18;
  const swing = Math.sin(w.phase) * scale * 7;
  const armSwing = Math.sin(w.phase + Math.PI) * scale * 6;
  const bob = Math.abs(Math.cos(w.phase)) * scale * 2.5;

  const x = w.x;
  const hipY = GROUND - legL - bob;
  const shoulderY = hipY - bodyH;
  const headCY = shoulderY - headR - scale * 2;

  const col = `hsl(${w.hue},100%,60%)`;
  ctx.strokeStyle = col;
  ctx.fillStyle = col;
  ctx.lineWidth = Math.max(2, scale * 2);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.shadowColor = col;
  ctx.shadowBlur = scale * 3;

  ctx.beginPath(); ctx.arc(x, headCY, headR, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, shoulderY); ctx.lineTo(x, hipY); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, shoulderY + scale * 2);
  ctx.lineTo(x - armL * 0.4 + armSwing, shoulderY + armL);
  ctx.moveTo(x, shoulderY + scale * 2);
  ctx.lineTo(x + armL * 0.4 - armSwing, shoulderY + armL);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x, hipY);
  ctx.lineTo(x - swing, hipY + legL);
  ctx.moveTo(x, hipY);
  ctx.lineTo(x + swing, hipY + legL);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function drawGround() {
  ctx.strokeStyle = "rgba(0,255,65,.25)";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND + sizeVal * 18); ctx.lineTo(W, GROUND + sizeVal * 18); ctx.stroke();
  ctx.strokeStyle = "rgba(0,255,65,.12)";
  ctx.lineWidth = 1;
  for (let gx = (t * 0.5) % 40 - 40; gx < W; gx += 40) {
    ctx.beginPath(); ctx.moveTo(gx, GROUND + sizeVal * 18 + 6); ctx.lineTo(gx + 14, GROUND + sizeVal * 18 + 6); ctx.stroke();
  }
}

function frame() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);
  drawGround();

  const scale = sizeVal;
  const step = speedVal * 0.6;
  for (const w of walkers) {
    if (playing) {
      w.phase += 0.12 + speedVal * 0.02;
      w.x += step * w.dir;
      const margin = 50;
      if (w.x > W + margin) w.x = -margin;
      if (w.x < -margin) w.x = W + margin;
    }
    drawWalker(w, scale);
  }
  if (playing) t += 1;
  requestAnimationFrame(frame);
}

document.getElementById("playBtn").addEventListener("click", (e) => {
  playing = !playing;
  e.target.textContent = playing ? "⏸ PAUSE" : "▶ PLAY";
  e.target.classList.toggle("on", playing);
});
document.getElementById("addBtn").addEventListener("click", () => {
  if (walkers.length >= 12) return;
  walkers.push(makeWalker(walkers.length, walkers.length + 1));
});
document.getElementById("rmBtn").addEventListener("click", () => {
  if (walkers.length > 1) walkers.pop();
});
document.getElementById("speed").addEventListener("input", (e) => { speedVal = +e.target.value; });
document.getElementById("size").addEventListener("input", (e) => { sizeVal = +e.target.value; });

frame();
</script>
</body>
</html>
